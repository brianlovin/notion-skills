name: Release

# Runs on every push to main. If the package.json version is newer than what's
# currently published on npm, builds + tests + publishes + creates a GitHub
# Release. To cut a release: bump `version` in package.json, commit, push.
#
# Auth: this workflow uses npm OIDC trusted publishing — npm mints a
# short-lived token at publish time based on the repo + workflow path,
# verified via the GitHub OIDC provider. No NPM_TOKEN secret needed.
# Trusted publisher config lives at:
#   https://www.npmjs.com/package/@brianlovin/notion-skills/access

on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "src/**"
      - "test/**"
      - "tsconfig.json"
      - "package-lock.json"
  # Allow manual re-runs from the Actions tab (or `gh workflow run release.yml`).
  workflow_dispatch:

jobs:
  release:
    name: Publish on version bump
    runs-on: ubuntu-latest
    permissions:
      contents: write     # needed to create the GitHub Release + tag
      id-token: write     # for OIDC publishing + npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # so gh release can see history for auto-generated notes

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # OIDC trusted publishing requires a recent npm. Node 22 ships with an
      # npm that does not yet support `--provenance --access public` over
      # OIDC. Pin to a version known to support it.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: node --test test/*.test.mjs

      - name: Check if version was bumped
        id: check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          PKG_NAME=$(node -p "require('./package.json').name")
          echo "version=$PKG_VERSION" >> $GITHUB_OUTPUT
          if npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "$PKG_NAME@$PKG_VERSION already published; nothing to do"
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "$PKG_NAME@$PKG_VERSION not on npm; will publish"
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.check.outputs.should_publish == 'true'
        run: npm publish --provenance --access public

      - name: Tag and create GitHub Release
        if: steps.check.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          # Tag may already exist if the maintainer ran `npm version` locally
          # and pushed with --follow-tags. Only create+push if missing.
          if ! git rev-parse --verify --quiet "refs/tags/v$VERSION"; then
            git tag "v$VERSION"
            git push origin "v$VERSION"
          fi
          # `gh release create` will skip silently if the release already
          # exists, so manual reruns of this workflow are safe.
          if ! gh release view "v$VERSION" >/dev/null 2>&1; then
            gh release create "v$VERSION" \
              --title "v$VERSION" \
              --generate-notes
          fi
